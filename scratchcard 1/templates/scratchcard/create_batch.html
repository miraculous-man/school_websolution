{% extends "base.html" %}
{% load static %}

{% block title %}Create Scratch Card Batch{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-plus-circle"></i> Create New Scratch Card Batch
                    </h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Batch Name *</label>
                            <input type="text" name="name" class="form-control" required placeholder="e.g., March 2024 Discount">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" placeholder="Add notes about this batch..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Number of Cards *</label>
                                <input type="number" name="quantity" class="form-control" required min="1" placeholder="100">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Value Per Card *</label>
                                <input type="number" name="value_per_card" class="form-control" step="0.01" required placeholder="500.00">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Purpose *</label>
                            <select name="purpose" class="form-select" required>
                                <option value="">Select purpose...</option>
                                <option value="discount">Discount Voucher</option>
                                <option value="fee_waiver">Fee Waiver</option>
                                <option value="library_credit">Library Credit</option>
                                <option value="exam_credit">Exam Credit</option>
                                <option value="reward">Reward Points</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="alert alert-info" role="alert">
                            <i class="bi bi-info-circle"></i> 
                            This will generate <strong id="card-count">100</strong> scratch cards with unique codes and PINs.
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle"></i> Create Batch
                            </button>
                            <a href="{% url 'scratchcard:card_list' %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelector('input[name="quantity"]').addEventListener('change', function() {
    document.getElementById('card-count').textContent = this.value || '100';
});
</script>
{% endblock %}
