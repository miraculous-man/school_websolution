{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5>Compose Message</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Recipients (Hold Ctrl to select multiple)</label>
                <select name="recipients" class="form-select" multiple required style="height: 150px;">
                    {% for r in recipients %}
                    <option value="{{ r.id }}">{{ r.get_full_name|default:r.username }} ({{ r.profile.role|title }})</option>
                    {% endfor %}
                </select>
                <div class="form-text">You can select one or more users to send this message to.</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="body" class="form-control" rows="10" required></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Send Message</button>
                <a href="{% url 'notifications:inbox' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
