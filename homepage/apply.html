{% extends 'homepage/base_public.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4 fw-bold">Admission Application</h2>
                    <p class="text-center text-muted mb-5">Please fill in all details accurately to begin your child's journey with us.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <h5 class="mb-3 text-primary border-bottom pb-2">Student Information</h5>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">First Name</label>
                                <input type="text" name="first_name" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Last Name</label>
                                <input type="text" name="last_name" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Other Name</label>
                                <input type="text" name="other_name" class="form-control">
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Gender</label>
                                <select name="gender" class="form-select" required>
                                    <option value="">Select Gender</option>
                                    <option value="M">Male</option>
                                    <option value="F">Female</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" name="date_of_birth" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Grade Level</label>
                                <select name="grade" class="form-select" required>
                                    <option value="">Select Grade</option>
                                    <option value="Grade 1">Grade 1</option>
                                    <option value="Grade 2">Grade 2</option>
                                    <option value="Grade 3">Grade 3</option>
                                    <option value="Grade 4">Grade 4</option>
                                    <option value="Grade 5">Grade 5</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="text" name="phone" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Home Address</label>
                            <textarea name="address" class="form-control" rows="2" required></textarea>
                        </div>
                        
                        <h5 class="mb-3 text-primary border-bottom pb-2">Parent/Guardian Information</h5>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Parent Full Name</label>
                                <input type="text" name="parent_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Parent Occupation</label>
                                <input type="text" name="parent_occupation" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Parent Phone</label>
                                <input type="text" name="parent_phone" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Parent Email</label>
                                <input type="email" name="parent_email" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Parent Home Address</label>
                            <textarea name="parent_address" class="form-control" rows="2" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">Submit Application</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
